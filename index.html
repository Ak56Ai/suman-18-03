    <!-- Custom CSS Variables for Font Stack -->
    <style>
      :root {
        --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        --font-heading: 'Playfair Display', Georgia, 'Times New Roman', Times, serif;
        --font-accent: 'Merriweather', Georgia, 'Times New Roman', Times, serif;
      }
      
      /* Fallback font loading optimization */
      .fonts-loaded body {
        font-family: var(--font-primary);
      }
      
      .fonts-loaded h1, 
      .fonts-loaded h2, 
      .fonts-loaded h3, 
      .fonts-loaded .heading-font {
        font-family: var(--font-heading);
      }
      
      /* Prevent layout shift while fonts load */
      body {
        font-family: var(--font-primary);
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      
      .fonts-loaded body {
        opacity: 1;
      }
      
      /* Ensure text is visible even if fonts don't load */
      @supports (font-variation-settings: normal) {
        body {
          font-family: 'Inter', var(--font-primary);
        }
      }
    </style>

    <!-- Font loading optimization script -->
    <script>
      (function() {
        // Show content immediately if fonts take too long
        const timeoutId = setTimeout(function() {
          document.documentElement.classList.add('fonts-loaded');
          document.body.style.opacity = '1';
        }, 3000);
        
        // Check if fonts are loaded
        if ('fonts' in document) {
          Promise.all([
            document.fonts.load('1em Inter'),
            document.fonts.load('bold 1em Inter'),
            document.fonts.load('1em Playfair Display'),
            document.fonts.load('1em Merriweather')
          ]).then(function() {
            clearTimeout(timeoutId);
            document.documentElement.classList.add('fonts-loaded');
            document.body.style.opacity = '1';
            
            // Store in session storage for subsequent pages
            try {
              sessionStorage.setItem('fonts-loaded', 'true');
            } catch(e) {}
          }).catch(function() {
            clearTimeout(timeoutId);
            document.documentElement.classList.add('fonts-loaded');
            document.body.style.opacity = '1';
          });
        } else {
          clearTimeout(timeoutId);
          document.documentElement.classList.add('fonts-loaded');
          document.body.style.opacity = '1';
        }
        
        // Check if fonts were already loaded in this session
        try {
          if (sessionStorage.getItem('fonts-loaded') === 'true') {
            clearTimeout(timeoutId);
            document.documentElement.classList.add('fonts-loaded');
            document.body.style.opacity = '1';
          }
        } catch(e) {}
      })();
    </script>
